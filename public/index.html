<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=/_21/login.html" />
    <title>سودانيل لوجيستك | Sudanil Logistics</title>
    <script>
        window.location.replace("/_21/login.html");
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #060d1e;
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            text-align: center;
        }
        .container {
            padding: 2rem;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.1);
            backdrop-filter: blur(10px);
            max-width: 400px;
        }
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-radius: 50%;
            display: inline-block;
            position: relative;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
            margin-bottom: 1.5rem;
        }
        .loader::after {
            content: '';  
            box-sizing: border-box;
            position: absolute;
            left: 0;
            top: 0;
            background: #d4af37;
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        h1 {
            font-size: 1.25rem;
            color: #d4af37;
            margin: 0 0 0.5rem 0;
            font-weight: 700;
        }
        p {
            font-size: 0.875rem;
            color: #cbd5e1;
            margin: 0;
        }
        a {
            color: #d4af37;
            text-decoration: none;
            font-weight: 600;
        }
        a:hover {
            text-decoration: underline;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="loader"></span>
        <h1>جاري التوجيه إلى بوابة العملاء...</h1>
        <p>إذا لم يتم توجيهك تلقائياً، <a href="/_21/login.html">اضغط هنا</a></p>
    </div>
</body>
</html>
